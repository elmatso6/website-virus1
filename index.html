<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schnittstelle wird initialisiert...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Matrix Hintergrund */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Terminal Fenster */
        .terminal {
            position: relative;
            z-index: 10;
            width: 650px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            padding: 20px;
            color: #00ff00;
        }
        .header {
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .log-line {
            margin-bottom: 8px;
            font-size: 14px;
            white-space: pre-wrap;
        }
        .success {
            color: #00ff00;
        }
        .warning {
            color: #ffcc00;
            font-weight: bold;
        }
        .error {
            color: #ff0000;
            font-weight: bold;
        }
        /* Cursor Blinken */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: #00ff00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Leinwand für den Matrix-Regen -->
    <canvas id="matrix"></canvas>

    <!-- Terminal Box -->
    <div class="terminal">
        <div class="header">>_ SYSTEM_BREACH_INITIALIZED</div>
        <div id="logs">
            <div class="log-line">> Verbinde mit Server... <span class="success">[OK]</span></div>
            <div class="log-line">> Umgehe Firewall... <span class="success">[ERFOLGREICH]</span></div>
            <div class="log-line warning">> WARNUNG: Root-Rechte erlangt.</div>
            <div class="log-line">> <span id="typing"></span><span id="cursor" class="cursor"></span></div>
        </div>
        <div id="active-task" class="log-line"></div>
    </div>

    <script>
        // --- 1. MATRIX REGEN EFFEKT ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const alphabet = letters.split("");

        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });


        // --- 2. LOGIK FÜR SCHREIBEFFEKT & LÖSCHEN ---
        const textToType = "Initialisiere Schadcode...";
        const typingElement = document.getElementById('typing');
        const activeTaskElement = document.getElementById('active-task');
        const logsContainer = document.getElementById('logs');
        let index = 0;

        // Ordner die nacheinander "gelöscht" werden
        const deleteTargets = [
            "Lösche C:/User/Desktop/Fotos...",
            "Lösche C:/User/Eigene Dokumente...",
            "Lösche C:/User/Browser/Gespeicherte_Passwoerter...",
            "Zerstöre System32 Bootloader..."
        ];
        let targetIndex = 0;

        // Schreibeffekt für den Anfang
        function typeWriter() {
            if (index < textToType.length) {
                typingElement.innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            } else {
                setTimeout(() => {
                    const newLine = document.createElement('div');
                    newLine.className = "log-line success";
                    newLine.innerHTML = `> Initialisiere Schadcode... OK`;
                    logsContainer.appendChild(newLine);
                    
                    // Cursor und Tipp-Zeile ausblenden
                    document.getElementById('cursor').style.display = "none";
                    typingElement.parentElement.style.display = "none";
                    
                    // Direkt mit dem "Löschen" anfangen
                    setTimeout(startDeletionProcess, 500);
                }, 500);
            }
        }

        // Generische Funktion für einen Ladebalken
        function simulateProgress(label, speed) {
            let percent = 0;
            const width = 20;
            
            const interval = setInterval(() => {
                percent += Math.floor(Math.random() * 8) + 1;
                
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(interval);
                }
                
                const filledCount = Math.round((percent / 100) * width);
                const bar = "[" + "=".repeat(filledCount) + " ".repeat(width - filledCount) + "]";
                
                activeTaskElement.innerHTML = `> ${label}: ${bar} ${percent}%`;
                
                if (percent === 100) {
                    setTimeout(() => {
                        finalizeTask(label);
                    }, 500);
                }
            }, speed);
        }

        // Wird aufgerufen wenn ein Ladebalken 100% erreicht
        function finalizeTask(label) {
            const newLine = document.createElement('div');
            newLine.className = "log-line error";
            newLine.innerHTML = `> ${label} [ERLEDIGT]`;
            logsContainer.appendChild(newLine);
            
            targetIndex++;
            setTimeout(startDeletionProcess, 500);
        }

        // Startet das Löschen der verschiedenen Kategorien
        function startDeletionProcess() {
            if (targetIndex < deleteTargets.length) {
                activeTaskElement.innerHTML = "";
                simulateProgress(deleteTargets[targetIndex], 80);
            } else {
                // Wenn alles "gelöscht" ist
                activeTaskElement.innerHTML = "";
                const finalLine = document.createElement('div');
                finalLine.className = "log-line error";
                finalLine.style.fontSize = "18px";
                finalLine.style.marginTop = "15px";
                finalLine.innerHTML = "> SYSTEM CRASH IMMINENT. PC WIRD NEU GESTARTET...";
                logsContainer.appendChild(finalLine);
            }
        }

        // Starte das Skript nach 1 Sekunde
        setTimeout(typeWriter, 1000);
    </script>

</body>
</html>
